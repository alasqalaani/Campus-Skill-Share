openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Campus Skill Share API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: posts
    description: Skill post operations
  - name: messages
    description: In-app messaging
  - name: users
    description: User profile operations
  - name: admin
    description: Admin-only operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on success or failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
            default: /
      responses:
        '302':
          description: Redirect to OIDC logout.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /users/me:
    get:
      tags: [users]
      operationId: getMyProfile
      summary: Get current user profile (including role and display name)
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [users]
      operationId: updateMyProfile
      summary: Update current user display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /posts:
    get:
      tags: [posts]
      operationId: listPosts
      summary: List skill posts (newest first)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
    post:
      tags: [posts]
      operationId: createPost
      summary: Create a new skill post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /posts/stats:
    get:
      tags: [posts]
      operationId: getPostStats
      summary: Get post counts grouped by category
      responses:
        '200':
          description: Category stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostStatsResponse'

  /posts/{postId}:
    get:
      tags: [posts]
      operationId: getPost
      summary: Get a single skill post by ID
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [posts]
      operationId: deletePost
      summary: Delete a post (admin or post owner)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /messages/{otherUserId}:
    get:
      tags: [messages]
      operationId: getConversation
      summary: Get messages between current user and another user
      parameters:
        - name: otherUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /messages:
    post:
      tags: [messages]
      operationId: sendMessage
      summary: Send a message to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageInput'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /messages/conversations:
    get:
      tags: [messages]
      operationId: listConversations
      summary: List all conversations for the current user
      responses:
        '200':
          description: Conversation summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      /ratings:
        post:
          tags: [ratings]
          operationId: submitRating
          summary: Submit a rating for a completed exchange
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/RatingSubmit'
          responses:
            '201':
              description: Rating created
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Rating'
            '400':
              description: Invalid rating data
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorEnvelope'
            '401':
              description: Not authenticated
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorEnvelope'
            '404':
              description: Post not found
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorEnvelope'
            '409':
              description: Already rated
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorEnvelope'

      /ratings/user/{userId}:
        get:
          tags: [ratings]
          operationId: getUserRatings
          summary: Get ratings received by a user
          parameters:
            - name: userId
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: User ratings
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      ratings:
                        type: array
                        items:
                          $ref: '#/components/schemas/Rating'
                      average:
                        type: [number, 'null']
                      total:
                        type: integer
  /admin/posts:
    get:
      tags: [admin]
      operationId: adminListPosts
      summary: Admin - list all posts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: All posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin/stats:
    get:
      tags: [admin]
      operationId: getAdminStats
      summary: Admin - platform statistics
      responses:
        '200':
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserProfile:
      type: object
      required: [id, email, displayName, role, profileImageUrl, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        displayName:
          type: string
        role:
          type: string
          enum: [student, admin]
        profileImageUrl:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
          minLength: 2

    PostAuthor:
      type: object
      required: [id, displayName, profileImageUrl]
      properties:
        id:
          type: string
        displayName:
          type: string
        profileImageUrl:
          type: [string, 'null']

    Post:
      type: object
      required: [id, title, category, description, createdAt, author]
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        description:
          type: string
        availability:
          type: [string, 'null']
        priceRate:
          type: [string, 'null']
        status:
          type: string
          enum: [open, completed]
        createdAt:
          type: string
          format: date-time
        author:
          $ref: '#/components/schemas/PostAuthor'
          
     Rating:
       type: object
       required: [id, postId, score, createdAt, rater]
       properties:
          id:
            type: string
          postId:
            type: string
          score:
            type: integer
          comment:
            type: [string, 'null']
          createdAt:
            type: string
          rater:
            type: object
       required: [id, displayName]
       properties:
          id:
            type: string
          displayName:
            type: string
    RatingSubmit:
      type: object
      required: [postId, score]
      properties:
        postId:
          type: string
        score:
          type: integer
        comment:
          type: [string, 'null']
    PostInput:
      type: object
      required: [title, category, description]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 150
        category:
          type: string
          enum: [Tutoring, Design, Music, Tech, Language, Other]
        description:
          type: string
          minLength: 20
          maxLength: 500
        availability:
          type: string
          maxLength: 200
        priceRate:
          type: string
          maxLength: 100

    PostListResponse:
      type: object
      required: [posts, total]
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        total:
          type: integer

    CategoryStat:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    PostStatsResponse:
      type: object
      required: [categories, total]
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryStat'
        total:
          type: integer

    Message:
      type: object
      required: [id, senderId, receiverId, content, createdAt]
      properties:
        id:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [receiverId, content]
      properties:
        receiverId:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 2000

    MessageListResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    ConversationSummary:
      type: object
      required: [otherUser, lastMessage, unreadCount]
      properties:
        otherUser:
          $ref: '#/components/schemas/PostAuthor'
        lastMessage:
          $ref: '#/components/schemas/Message'
        unreadCount:
          type: integer

    ConversationListResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSummary'

    AdminStats:
      type: object
      required: [totalUsers, totalPosts, postsByCategory]
      properties:
        totalUsers:
          type: integer
        totalPosts:
          type: integer
        postsByCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryStat'
